<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>자산 · 부채 대시보드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f7f5f0;                      /* 전체 배경 (살짝 따뜻한 흰색) */
  --surface:#ffffff;                 /* 카드 배경 */
  --surface2:#f0ede6;                /* 탭·보조 배경 */
  --line:rgba(0,0,0,.10);            /* 테두리 */
  --line-gold:rgba(184,134,42,.30);
  --text:#2a2620;                    /* 본문 글자 */
  --muted:#6f6856;                   /* 흐린 글자 */
  --faint:#9a9384;
  --gold:#b8862a;                    /* 포인트 색 */
  --green:#2f9e5e;
  --green-dim:rgba(47,158,94,.12);
  --red:#d05a3c;
  --red-dim:rgba(208,90,60,.12);
  --blue:#3f6fae;
  --blue-dim:rgba(63,111,174,.12);
  --radius:14px;
  --mono:'IBM Plex Mono',ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'IBM Plex Sans KR',sans-serif;
  background:var(--bg);
  color:var(--text);
  font-size:15px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  background-image:
    radial-gradient(900px 600px at 85% -5%, rgba(212,168,87,.07), transparent 60%),
    radial-gradient(700px 500px at 0% 100%, rgba(143,176,214,.05), transparent 55%);
  background-attachment:fixed;
}
.num{font-family:var(--mono);font-feature-settings:'tnum' 1;letter-spacing:-.02em}
.wrap{max-width:1120px;margin:0 auto;padding:28px 20px 80px}

/* Header */
header.top{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:22px}
.brand h1{font-size:1.55rem;font-weight:700;letter-spacing:-.02em;line-height:1.1}
.brand h1 .dot{color:var(--gold)}
.brand p{color:var(--muted);font-size:.84rem;margin-top:5px}
.top-actions{display:flex;gap:8px}
.icon-btn{
  background:var(--surface);border:1px solid var(--line);color:var(--muted);
  border-radius:9px;padding:8px 12px;font-size:.8rem;cursor:pointer;font-family:inherit;
  transition:.15s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;
}
.icon-btn:hover{border-color:var(--line-gold);color:var(--text)}

/* Tabs */
.tabs{display:flex;gap:4px;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:4px;margin-bottom:24px;width:fit-content}
.tab{
  border:none;background:transparent;color:var(--muted);font-family:inherit;font-size:.88rem;font-weight:500;
  padding:8px 18px;border-radius:8px;cursor:pointer;transition:.15s;
}
.tab.active{background:var(--surface2);color:var(--text);box-shadow:0 1px 0 var(--line-gold) inset}
.tab:hover:not(.active){color:var(--text)}

.view{display:none;animation:fade .25s ease}
.view.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* KPI cards */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
.kpi{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:18px 18px 16px;position:relative;overflow:hidden;
}
.kpi::before{content:"";position:absolute;top:0;left:0;width:100%;height:2px;background:var(--accent,var(--gold));opacity:.65}
.kpi .k-label{font-size:.78rem;color:var(--muted);display:flex;align-items:center;gap:6px}
.kpi .k-value{font-size:1.65rem;font-weight:600;margin-top:8px;line-height:1.1}
.kpi .k-sub{font-size:.74rem;color:var(--faint);margin-top:6px}
.kpi.net{--accent:var(--gold)} .kpi.asset{--accent:var(--green)}
.kpi.debt{--accent:var(--red)} .kpi.flow{--accent:var(--blue)}
.pos{color:var(--green)} .neg{color:var(--red)}

/* Section */
.section{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px;flex-wrap:wrap}
.section-head h2{font-size:1rem;font-weight:600;letter-spacing:-.01em}
.section-head .meta{font-size:.78rem;color:var(--muted)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}

/* breakdown rows */
.brk{display:flex;flex-direction:column;gap:13px}
.brk-row .brk-top{display:flex;justify-content:space-between;align-items:baseline;font-size:.88rem;margin-bottom:6px}
.brk-row .brk-name{color:var(--text);display:flex;align-items:center;gap:8px}
.brk-row .brk-val{font-weight:600}
.bar{height:7px;background:rgba(255,255,255,.05);border-radius:99px;overflow:hidden}
.bar > span{display:block;height:100%;border-radius:99px;background:var(--c,var(--gold));transition:width .5s ease}
.tag{font-size:.66rem;font-weight:500;padding:2px 8px;border-radius:99px;border:1px solid transparent;white-space:nowrap}
.t-asset{background:var(--green-dim);color:var(--green)}
.t-expense{background:var(--blue-dim);color:var(--blue)}
.t-debt{background:var(--red-dim);color:var(--red)}
.t-ongoing{background:var(--green-dim);color:var(--green)}
.t-scheduled{background:var(--blue-dim);color:var(--blue)}
.t-done{background:rgba(255,255,255,.06);color:var(--faint)}

/* Table */
.table-scroll{overflow-x:auto;margin:0 -20px;padding:0 20px}
table{width:100%;border-collapse:collapse;min-width:760px}
th{font-size:.74rem;color:var(--muted);font-weight:500;text-align:left;padding:10px 12px;border-bottom:1px solid var(--line);white-space:nowrap}
td{padding:13px 12px;border-bottom:1px solid var(--line);font-size:.87rem;vertical-align:middle}
tr:last-child td{border-bottom:none}
td.r,th.r{text-align:right}
tbody tr{transition:background .12s}
tbody tr:hover{background:rgba(255,255,255,.018)}
.cell-name{font-weight:500}
.cell-bank{color:var(--muted);font-size:.8rem}
.round{font-size:.78rem;color:var(--muted)}
.row-actions{display:flex;gap:6px;justify-content:flex-end}
.mini{border:1px solid var(--line);background:transparent;color:var(--muted);border-radius:7px;padding:5px 10px;font-size:.76rem;cursor:pointer;font-family:inherit;transition:.13s;white-space:nowrap}
.mini:hover{color:var(--text);border-color:var(--line-gold)}
.mini.pay{border-color:rgba(116,192,138,.3);color:var(--green)}
.mini.pay:hover{background:var(--green-dim)}
.mini.del:hover{color:var(--red);border-color:rgba(224,135,111,.4)}

/* primary button */
.btn{
  background:var(--gold);color:#241c0c;border:none;border-radius:9px;padding:9px 16px;
  font-family:inherit;font-weight:600;font-size:.85rem;cursor:pointer;transition:.15s;
}
.btn:hover{filter:brightness(1.08)}
.btn.ghost{background:var(--surface2);color:var(--text);border:1px solid var(--line)}
.btn.ghost:hover{border-color:var(--line-gold)}

/* empty */
.empty{text-align:center;padding:46px 20px;color:var(--muted)}
.empty p{margin-bottom:16px;font-size:.9rem}
.empty .e-icon{font-size:1.8rem;margin-bottom:10px;opacity:.5}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(10,8,5,.7);backdrop-filter:blur(3px);display:none;align-items:flex-start;justify-content:center;padding:40px 16px;z-index:50;overflow-y:auto}
.overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--line-gold);border-radius:18px;width:100%;max-width:440px;padding:24px;box-shadow:0 30px 80px rgba(0,0,0,.5)}
.modal h3{font-size:1.05rem;font-weight:600;margin-bottom:18px}
.field{margin-bottom:14px}
.field label{display:block;font-size:.78rem;color:var(--muted);margin-bottom:6px}
.field input,.field select{
  width:100%;background:var(--bg);border:1px solid var(--line);border-radius:9px;
  padding:10px 12px;color:var(--text);font-family:inherit;font-size:.9rem;
}
.field input:focus,.field select:focus{outline:none;border-color:var(--gold)}
.field .num-in{font-family:var(--mono)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.seg{display:flex;gap:6px}
.seg button{flex:1;background:var(--bg);border:1px solid var(--line);color:var(--muted);border-radius:9px;padding:9px;font-family:inherit;font-size:.84rem;cursor:pointer;transition:.13s}
.seg button.on{border-color:var(--gold);color:var(--gold);background:rgba(212,168,87,.08)}
.modal-actions{display:flex;gap:10px;margin-top:22px}
.modal-actions .btn{flex:1}
.hidden{display:none!important}

/* toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface2);border:1px solid var(--line-gold);color:var(--text);padding:11px 20px;border-radius:10px;font-size:.85rem;opacity:0;transition:.25s;pointer-events:none;z-index:60}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:780px){
  .kpi-grid{grid-template-columns:1fr 1fr}
  .grid-2{grid-template-columns:1fr}
  .kpi .k-value{font-size:1.4rem}
}
@media(max-width:460px){
  .wrap{padding:20px 14px 70px}
  .kpi-grid{grid-template-columns:1fr 1fr;gap:10px}
}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="brand">
      <h1>자산 · 부채 대시보드<span class="dot">.</span></h1>
      <p>전체 재무 그림을 한눈에 — 변동지출·잔고는 토스, 큰 그림은 여기서</p>
    </div>
    <div class="top-actions">
      <button class="icon-btn" id="exportBtn">↧ 내보내기</button>
      <button class="icon-btn" id="importBtn">↥ 불러오기</button>
      <input type="file" id="importFile" accept="application/json" class="hidden">
    </div>
  </header>

  <div class="tabs">
    <button class="tab active" data-view="dashboard">대시보드</button>
    <button class="tab" data-view="items">항목</button>
    <button class="tab" data-view="banks">은행</button>
  </div>

  <!-- DASHBOARD -->
  <section class="view active" id="view-dashboard">
    <div class="kpi-grid" id="kpiGrid"></div>
    <div class="grid-2">
      <div class="section">
        <div class="section-head"><h2>부채 현황</h2><span class="meta" id="debtMeta"></span></div>
        <div class="brk" id="debtBrk"></div>
      </div>
      <div class="section">
        <div class="section-head"><h2>자산 현황</h2><span class="meta" id="assetMeta"></span></div>
        <div class="brk" id="assetBrk"></div>
      </div>
    </div>
    <div class="section">
      <div class="section-head"><h2>은행별 잔액</h2><span class="meta" id="bankMeta"></span></div>
      <div class="brk" id="bankBrk"></div>
    </div>
  </section>

  <!-- ITEMS -->
  <section class="view" id="view-items">
    <div class="section">
      <div class="section-head">
        <h2>전체 항목</h2>
        <button class="btn" id="addItemBtn">+ 항목 추가</button>
      </div>
      <div class="table-scroll">
        <table id="itemsTable">
          <thead><tr>
            <th>이름</th><th>구분</th><th class="r">원금잔액</th><th class="r">월 지출</th>
            <th>상태</th><th>회차</th><th>은행</th><th class="r">관리</th>
          </tr></thead>
          <tbody id="itemsBody"></tbody>
        </table>
      </div>
      <div class="empty hidden" id="itemsEmpty">
        <div class="e-icon">○</div>
        <p>아직 항목이 없습니다. 대출·미납·고정지출·자산을 추가해 보세요.</p>
        <button class="btn ghost" id="seedBtn">예시 데이터로 미리보기</button>
      </div>
    </div>
  </section>

  <!-- BANKS -->
  <section class="view" id="view-banks">
    <div class="section">
      <div class="section-head">
        <h2>은행 계좌</h2>
        <button class="btn" id="addBankBtn">+ 은행 추가</button>
      </div>
      <div class="table-scroll">
        <table id="banksTable">
          <thead><tr><th>은행명</th><th class="r">잔액</th><th>연결 항목</th><th class="r">관리</th></tr></thead>
          <tbody id="banksBody"></tbody>
        </table>
      </div>
      <div class="empty hidden" id="banksEmpty">
        <div class="e-icon">○</div>
        <p>등록된 은행 계좌가 없습니다.</p>
      </div>
    </div>
  </section>
</div>

<!-- ITEM MODAL -->
<div class="overlay" id="itemOverlay">
  <div class="modal">
    <h3 id="itemModalTitle">항목 추가</h3>
    <div class="field">
      <label>이름</label>
      <input type="text" id="f-name" placeholder="예: OO은행 신용대출">
    </div>
    <div class="field">
      <label>구분</label>
      <select id="f-type">
        <option value="loan">가계대출</option>
        <option value="debt_adj">채무조정</option>
        <option value="unpaid">세금·미납</option>
        <option value="fixed">고정지출</option>
        <option value="asset">자산</option>
      </select>
    </div>
    <div class="field" id="wrap-assetStatus">
      <label>자산 시점</label>
      <div class="seg" id="assetSeg">
        <button type="button" data-v="current" class="on">현재 보유</button>
        <button type="button" data-v="planned">예정</button>
      </div>
    </div>
    <div class="field" id="wrap-principal">
      <label>원금잔액 (남은 빚)</label>
      <input type="text" inputmode="numeric" id="f-principal" class="num-in" placeholder="0">
    </div>
    <div class="field" id="wrap-amount">
      <label>자산 금액</label>
      <input type="text" inputmode="numeric" id="f-amount" class="num-in" placeholder="0">
    </div>
    <div class="field" id="wrap-monthly">
      <label>월 지출 (매달 나가는 금액)</label>
      <input type="text" inputmode="numeric" id="f-monthly" class="num-in" placeholder="0">
    </div>
    <div class="field-row" id="wrap-dates">
      <div class="field" style="margin:0">
        <label>시작일</label>
        <input type="date" id="f-start">
      </div>
      <div class="field" style="margin:0">
        <label>종료일</label>
        <input type="date" id="f-end">
      </div>
    </div>
    <div class="field">
      <label>연결 은행 (선택)</label>
      <select id="f-bank"><option value="">연결 안 함</option></select>
    </div>
    <div class="modal-actions">
      <button class="btn ghost" id="itemCancel">취소</button>
      <button class="btn" id="itemSave">저장</button>
    </div>
  </div>
</div>

<!-- BANK MODAL -->
<div class="overlay" id="bankOverlay">
  <div class="modal">
    <h3 id="bankModalTitle">은행 추가</h3>
    <div class="field"><label>은행명</label><input type="text" id="b-name" placeholder="예: 카카오뱅크"></div>
    <div class="field"><label>잔액</label><input type="text" inputmode="numeric" id="b-balance" class="num-in" placeholder="0"></div>
    <div class="modal-actions">
      <button class="btn ghost" id="bankCancel">취소</button>
      <button class="btn" id="bankSave">저장</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
"use strict";
/* ---------- constants ---------- */
const KEY = 'finance_dashboard_v1';
const TYPES = {
  loan:    {label:'가계대출', group:'debt'},
  debt_adj:{label:'채무조정', group:'debt'},
  unpaid:  {label:'세금·미납', group:'debt'},
  fixed:   {label:'고정지출', group:'expense'},
  asset:   {label:'자산',     group:'asset'},
};
const isDebt = t => TYPES[t].group==='debt';
const hasMonthly = t => t==='fixed' || isDebt(t);
const hasDates = t => t==='fixed' || isDebt(t);

let state = {banks:[], items:[]};
let editItemId = null, editBankId = null, assetStatusSel = 'current';

/* ---------- storage (window.storage with localStorage fallback) ---------- */
const Store = {
  async load(){
    if(window.storage && typeof window.storage.get==='function'){
      try{ const r = await window.storage.get(KEY); if(r && r.value) return JSON.parse(r.value); }
      catch(e){ /* key not found */ }
      return null;
    }
    try{ const v = localStorage.getItem(KEY); return v?JSON.parse(v):null; }catch(e){ return null; }
  },
  async save(data){
    const json = JSON.stringify(data);
    if(window.storage && typeof window.storage.set==='function'){
      try{ await window.storage.set(KEY, json); }catch(e){ console.error('save failed',e); }
      return;
    }
    try{ localStorage.setItem(KEY, json); }catch(e){}
  }
};
function persist(){ Store.save(state); }

/* ---------- helpers ---------- */
const uid = () => (crypto.randomUUID ? crypto.randomUUID() : 'id'+Date.now()+Math.random().toString(16).slice(2));
const $ = id => document.getElementById(id);
function won(n){ return Math.round(n||0).toLocaleString('ko-KR')+'원'; }
function compact(n){
  n = Math.round(n||0); const neg = n<0; n = Math.abs(n);
  let s;
  if(n>=1e8){ const eok=Math.floor(n/1e8), man=Math.floor((n%1e8)/1e4); s=eok+'억'+(man?' '+man.toLocaleString():''); }
  else if(n>=1e4){ const man=Math.floor(n/1e4), rest=n%1e4; s=man.toLocaleString()+'만'+(rest?' '+rest.toLocaleString():''); }
  else s=n.toLocaleString();
  return (neg?'-':'')+s;
}
function parseNum(v){ return Number(String(v).replace(/[^0-9.-]/g,'')) || 0; }
function fmtInput(el){ el.addEventListener('input',()=>{ const c=el.selectionStart,raw=el.value.replace(/[^0-9]/g,''); el.value=raw?Number(raw).toLocaleString('ko-KR'):''; }); }
function bankName(id){ const b=state.banks.find(x=>x.id===id); return b?b.name:''; }

function statusOf(it){
  if(it.type==='asset') return null;
  if(isDebt(it.type) && (it.principal||0)<=0) return 'done';
  const today=new Date(); today.setHours(0,0,0,0);
  if(it.start){ const s=new Date(it.start); if(today<s) return 'scheduled'; }
  if(it.end){ const e=new Date(it.end); if(today>e) return 'done'; }
  return 'ongoing';
}
const STATUS_LABEL = {ongoing:'상환중', scheduled:'상환예정', done:'상환완료'};
function roundOf(it){
  if(!it.start || !it.end) return null;
  const s=new Date(it.start), e=new Date(it.end), t=new Date();
  const total=(e.getFullYear()-s.getFullYear())*12+(e.getMonth()-s.getMonth())+1;
  let cur=(t.getFullYear()-s.getFullYear())*12+(t.getMonth()-s.getMonth())+1;
  cur=Math.max(0,Math.min(cur,total));
  if(total<=0) return null;
  return {cur,total};
}

/* ---------- aggregates ---------- */
function totals(){
  let curAsset=0, planAsset=0, debt=0, flow=0;
  for(const it of state.items){
    if(it.type==='asset'){ (it.assetStatus==='planned'?planAsset+=it.amount||0:curAsset+=it.amount||0); }
    else { if(isDebt(it.type)) debt+=it.principal||0; if(hasMonthly(it.type)) flow+=it.monthly||0; }
  }
  const bankTotal = state.banks.reduce((a,b)=>a+(b.balance||0),0);
  return {curAsset, planAsset, debt, flow, bankTotal,
          net:(curAsset+bankTotal)-debt,
          netPlanned:(curAsset+planAsset+bankTotal)-debt};
}

/* ---------- render ---------- */
function render(){ renderDashboard(); renderItems(); renderBanks(); }

function renderDashboard(){
  const t = totals();
  $('kpiGrid').innerHTML = `
    <div class="kpi net">
      <div class="k-label">순자산 (현재)</div>
      <div class="k-value num ${t.net>=0?'pos':'neg'}">${compact(t.net)}</div>
      <div class="k-sub">예정 포함 시 ${compact(t.netPlanned)}</div>
    </div>
    <div class="kpi asset">
      <div class="k-label">총 자산</div>
      <div class="k-value num">${compact(t.curAsset+t.bankTotal)}</div>
      <div class="k-sub">예정 자산 +${compact(t.planAsset)}</div>
    </div>
    <div class="kpi debt">
      <div class="k-label">총 부채</div>
      <div class="k-value num">${compact(t.debt)}</div>
      <div class="k-sub">대출·미납·채무조정 합산</div>
    </div>
    <div class="kpi flow">
      <div class="k-label">월 고정 유출</div>
      <div class="k-value num">${compact(t.flow)}</div>
      <div class="k-sub">매달 빠져나가는 금액</div>
    </div>`;

  // debt breakdown
  const debts = state.items.filter(i=>isDebt(i.type));
  const debtSum = debts.reduce((a,i)=>a+(i.principal||0),0);
  $('debtMeta').textContent = `${debts.length}건 · ${compact(debtSum)}`;
  $('debtBrk').innerHTML = debts.length ? debts
    .slice().sort((a,b)=>(b.principal||0)-(a.principal||0))
    .map(i=>{
      const r=roundOf(i); const pct=r?Math.round(r.cur/r.total*100):0;
      return `<div class="brk-row">
        <div class="brk-top">
          <span class="brk-name">${esc(i.name)} <span class="tag t-debt">${TYPES[i.type].label}</span></span>
          <span class="brk-val num">${compact(i.principal||0)}</span>
        </div>
        <div class="bar"><span style="width:${pct}%;--c:var(--red)"></span></div>
        <div class="k-sub" style="margin-top:4px">${r?`회차 ${r.cur}/${r.total} (${pct}%)`:'기간 미설정'} · 월 ${compact(i.monthly||0)}</div>
      </div>`;}).join('')
    : `<div class="k-sub">등록된 부채가 없습니다.</div>`;

  // asset breakdown
  const assets = state.items.filter(i=>i.type==='asset');
  const aSum = assets.reduce((a,i)=>a+(i.amount||0),0)+t.bankTotal;
  $('assetMeta').textContent = compact(aSum);
  const rows = [];
  if(t.bankTotal) rows.push({name:'은행 잔액 합계', val:t.bankTotal, tag:'현재'});
  assets.forEach(i=>rows.push({name:i.name, val:i.amount||0, tag:i.assetStatus==='planned'?'예정':'현재'}));
  $('assetBrk').innerHTML = rows.length ? rows
    .sort((a,b)=>b.val-a.val)
    .map(r=>{
      const pct=aSum?Math.round(r.val/aSum*100):0;
      const isPlan=r.tag==='예정';
      return `<div class="brk-row">
        <div class="brk-top">
          <span class="brk-name">${esc(r.name)} <span class="tag ${isPlan?'t-expense':'t-asset'}">${r.tag}</span></span>
          <span class="brk-val num">${compact(r.val)}</span>
        </div>
        <div class="bar"><span style="width:${pct}%;--c:${isPlan?'var(--blue)':'var(--green)'}"></span></div>
      </div>`;}).join('')
    : `<div class="k-sub">등록된 자산이 없습니다.</div>`;

  // banks
  $('bankMeta').textContent = `${state.banks.length}개 · ${compact(t.bankTotal)}`;
  $('bankBrk').innerHTML = state.banks.length ? state.banks
    .slice().sort((a,b)=>(b.balance||0)-(a.balance||0))
    .map(b=>{
      const pct=t.bankTotal?Math.round((b.balance||0)/t.bankTotal*100):0;
      return `<div class="brk-row">
        <div class="brk-top"><span class="brk-name">${esc(b.name)}</span><span class="brk-val num">${won(b.balance)}</span></div>
        <div class="bar"><span style="width:${pct}%;--c:var(--gold)"></span></div>
      </div>`;}).join('')
    : `<div class="k-sub">등록된 은행이 없습니다.</div>`;
}

function renderItems(){
  const body=$('itemsBody'), empty=$('itemsEmpty');
  if(!state.items.length){ body.innerHTML=''; empty.classList.remove('hidden'); $('itemsTable').classList.add('hidden'); return; }
  empty.classList.add('hidden'); $('itemsTable').classList.remove('hidden');
  const order={debt:0,expense:1,asset:2};
  body.innerHTML = state.items.slice()
    .sort((a,b)=>order[TYPES[a.type].group]-order[TYPES[b.type].group])
    .map(i=>{
      const st=statusOf(i), r=roundOf(i);
      const principalCell = isDebt(i.type)?`<span class="num">${won(i.principal)}</span>`
        : i.type==='asset'?`<span class="num">${won(i.amount)}</span>` : '–';
      const monthlyCell = hasMonthly(i.type)?`<span class="num">${won(i.monthly)}</span>`:'–';
      const statusCell = st?`<span class="tag t-${st}">${STATUS_LABEL[st]}</span>`
        : (i.type==='asset'?`<span class="tag ${i.assetStatus==='planned'?'t-expense':'t-asset'}">${i.assetStatus==='planned'?'예정':'현재'}</span>`:'–');
      const roundCell = r?`<span class="round">${r.cur}/${r.total}</span>`:'–';
      const payBtn = (isDebt(i.type) && (i.principal||0)>0)
        ? `<button class="mini pay" data-pay="${i.id}">납입</button>` : '';
      return `<tr>
        <td class="cell-name">${esc(i.name)}</td>
        <td><span class="tag t-${TYPES[i.type].group}">${TYPES[i.type].label}</span></td>
        <td class="r">${principalCell}</td>
        <td class="r">${monthlyCell}</td>
        <td>${statusCell}</td>
        <td>${roundCell}</td>
        <td class="cell-bank">${i.bankId?esc(bankName(i.bankId)):'–'}</td>
        <td class="r"><div class="row-actions">
          ${payBtn}
          <button class="mini" data-edit="${i.id}">수정</button>
          <button class="mini del" data-del="${i.id}">삭제</button>
        </div></td>
      </tr>`;}).join('');
}

function renderBanks(){
  const body=$('banksBody'), empty=$('banksEmpty');
  if(!state.banks.length){ body.innerHTML=''; empty.classList.remove('hidden'); $('banksTable').classList.add('hidden'); return; }
  empty.classList.add('hidden'); $('banksTable').classList.remove('hidden');
  body.innerHTML = state.banks.map(b=>{
    const linked = state.items.filter(i=>i.bankId===b.id).map(i=>i.name);
    return `<tr>
      <td class="cell-name">${esc(b.name)}</td>
      <td class="r num">${won(b.balance)}</td>
      <td class="cell-bank">${linked.length?esc(linked.join(', ')):'–'}</td>
      <td class="r"><div class="row-actions">
        <button class="mini" data-bedit="${b.id}">수정</button>
        <button class="mini del" data-bdel="${b.id}">삭제</button>
      </div></td>
    </tr>`;}).join('');
}
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

/* ---------- item modal ---------- */
function syncItemFields(){
  const t=$('f-type').value;
  $('wrap-assetStatus').classList.toggle('hidden', t!=='asset');
  $('wrap-principal').classList.toggle('hidden', !isDebt(t));
  $('wrap-amount').classList.toggle('hidden', t!=='asset');
  $('wrap-monthly').classList.toggle('hidden', !hasMonthly(t));
  $('wrap-dates').classList.toggle('hidden', !hasDates(t));
}
function fillBankSelect(sel){
  $('f-bank').innerHTML = '<option value="">연결 안 함</option>' +
    state.banks.map(b=>`<option value="${b.id}">${esc(b.name)}</option>`).join('');
  if(sel) $('f-bank').value=sel;
}
function openItem(id){
  editItemId=id||null;
  $('itemModalTitle').textContent = id?'항목 수정':'항목 추가';
  fillBankSelect();
  if(id){
    const i=state.items.find(x=>x.id===id);
    $('f-name').value=i.name; $('f-type').value=i.type;
    $('f-principal').value=i.principal?i.principal.toLocaleString('ko-KR'):'';
    $('f-amount').value=i.amount?i.amount.toLocaleString('ko-KR'):'';
    $('f-monthly').value=i.monthly?i.monthly.toLocaleString('ko-KR'):'';
    $('f-start').value=i.start||''; $('f-end').value=i.end||'';
    $('f-bank').value=i.bankId||'';
    assetStatusSel=i.assetStatus||'current';
  } else {
    $('f-name').value=''; $('f-type').value='loan';
    $('f-principal').value=''; $('f-amount').value=''; $('f-monthly').value='';
    $('f-start').value=''; $('f-end').value=''; $('f-bank').value='';
    assetStatusSel='current';
  }
  [...$('assetSeg').children].forEach(b=>b.classList.toggle('on', b.dataset.v===assetStatusSel));
  syncItemFields();
  $('itemOverlay').classList.add('open');
}
function saveItem(){
  const name=$('f-name').value.trim();
  if(!name){ toast('이름을 입력해 주세요'); return; }
  const t=$('f-type').value;
  const data={
    name, type:t,
    principal:isDebt(t)?parseNum($('f-principal').value):0,
    amount:t==='asset'?parseNum($('f-amount').value):0,
    monthly:hasMonthly(t)?parseNum($('f-monthly').value):0,
    start:hasDates(t)?($('f-start').value||''):'',
    end:hasDates(t)?($('f-end').value||''):'',
    bankId:$('f-bank').value||null,
    assetStatus:t==='asset'?assetStatusSel:null,
  };
  if(editItemId){ Object.assign(state.items.find(x=>x.id===editItemId), data); }
  else { state.items.push({id:uid(), ...data}); }
  persist(); render(); $('itemOverlay').classList.remove('open');
  toast(editItemId?'수정되었습니다':'추가되었습니다');
}

/* ---------- bank modal ---------- */
function openBank(id){
  editBankId=id||null;
  $('bankModalTitle').textContent=id?'은행 수정':'은행 추가';
  if(id){ const b=state.banks.find(x=>x.id===id); $('b-name').value=b.name; $('b-balance').value=b.balance?b.balance.toLocaleString('ko-KR'):''; }
  else { $('b-name').value=''; $('b-balance').value=''; }
  $('bankOverlay').classList.add('open');
}
function saveBank(){
  const name=$('b-name').value.trim();
  if(!name){ toast('은행명을 입력해 주세요'); return; }
  const balance=parseNum($('b-balance').value);
  if(editBankId){ Object.assign(state.banks.find(x=>x.id===editBankId),{name,balance}); }
  else { state.banks.push({id:uid(),name,balance}); }
  persist(); render(); $('bankOverlay').classList.remove('open');
  toast(editBankId?'수정되었습니다':'추가되었습니다');
}

/* ---------- toast ---------- */
let toastT;
function toast(msg){ const el=$('toast'); el.textContent=msg; el.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('show'),1900); }

/* ---------- events ---------- */
document.querySelectorAll('.tab').forEach(tab=>tab.addEventListener('click',()=>{
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  tab.classList.add('active'); $('view-'+tab.dataset.view).classList.add('active');
}));

$('addItemBtn').onclick=()=>openItem();
$('addBankBtn').onclick=()=>openBank();
$('itemCancel').onclick=()=>$('itemOverlay').classList.remove('open');
$('bankCancel').onclick=()=>$('bankOverlay').classList.remove('open');
$('itemSave').onclick=saveItem;
$('bankSave').onclick=saveBank;
$('f-type').onchange=syncItemFields;
$('assetSeg').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b)return;
  assetStatusSel=b.dataset.v;
  [...$('assetSeg').children].forEach(x=>x.classList.toggle('on',x===b));
});
[$('itemOverlay'),$('bankOverlay')].forEach(o=>o.addEventListener('click',e=>{ if(e.target===o) o.classList.remove('open'); }));

document.addEventListener('click',e=>{
  const t=e.target;
  if(t.dataset.edit) openItem(t.dataset.edit);
  else if(t.dataset.del){ if(confirm('이 항목을 삭제할까요?')){ state.items=state.items.filter(i=>i.id!==t.dataset.del); persist(); render(); toast('삭제되었습니다'); } }
  else if(t.dataset.pay){
    const i=state.items.find(x=>x.id===t.dataset.pay);
    if(i){ i.principal=Math.max(0,(i.principal||0)-(i.monthly||0)); persist(); render(); toast('1회 납입 반영 — 잔액 '+won(i.principal)); }
  }
  else if(t.dataset.bedit) openBank(t.dataset.bedit);
  else if(t.dataset.bdel){
    const used=state.items.some(i=>i.bankId===t.dataset.bdel);
    if(confirm(used?'연결된 항목이 있습니다. 그래도 삭제할까요? (연결만 해제됩니다)':'이 은행을 삭제할까요?')){
      state.items.forEach(i=>{ if(i.bankId===t.dataset.bdel) i.bankId=null; });
      state.banks=state.banks.filter(b=>b.id!==t.dataset.bdel); persist(); render(); toast('삭제되었습니다');
    }
  }
});

$('seedBtn').onclick=()=>{
  const b1=uid(), b2=uid();
  state.banks=[{id:b1,name:'카카오뱅크',balance:3200000},{id:b2,name:'국민은행',balance:1500000}];
  state.items=[
    {id:uid(),name:'신용대출',type:'loan',principal:24000000,amount:0,monthly:850000,start:'2024-03-01',end:'2027-02-28',bankId:b2,assetStatus:null},
    {id:uid(),name:'마이너스 통장',type:'loan',principal:5000000,amount:0,monthly:200000,start:'2025-01-01',end:'2026-12-31',bankId:b1,assetStatus:null},
    {id:uid(),name:'지방세 미납',type:'unpaid',principal:1200000,amount:0,monthly:400000,start:'2026-05-01',end:'2026-08-31',bankId:null,assetStatus:null},
    {id:uid(),name:'월세',type:'fixed',principal:0,amount:0,monthly:600000,start:'',end:'',bankId:b1,assetStatus:null},
    {id:uid(),name:'보험료',type:'fixed',principal:0,amount:0,monthly:180000,start:'',end:'',bankId:null,assetStatus:null},
    {id:uid(),name:'전세보증금',type:'asset',principal:0,amount:50000000,monthly:0,start:'',end:'',bankId:null,assetStatus:'current'},
    {id:uid(),name:'예정 상여금',type:'asset',principal:0,amount:3000000,monthly:0,start:'',end:'',bankId:null,assetStatus:'planned'},
  ];
  persist(); render(); toast('예시 데이터를 불러왔습니다');
};

/* export / import */
$('exportBtn').onclick=()=>{
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='finance-dashboard-'+new Date().toISOString().slice(0,10)+'.json'; a.click();
  URL.revokeObjectURL(a.href); toast('백업 파일을 내려받았습니다');
};
$('importBtn').onclick=()=>$('importFile').click();
$('importFile').onchange=e=>{
  const f=e.target.files[0]; if(!f)return;
  const rd=new FileReader();
  rd.onload=()=>{ try{ const d=JSON.parse(rd.result); if(d.banks&&d.items){ state=d; persist(); render(); toast('데이터를 불러왔습니다'); } else toast('형식이 올바르지 않습니다'); }catch(_){ toast('파일을 읽을 수 없습니다'); } };
  rd.readAsText(f); e.target.value='';
};

/* number input formatting */
['f-principal','f-amount','f-monthly','b-balance'].forEach(id=>fmtInput($(id)));

/* init */
(async function(){
  const loaded = await Store.load();
  if(loaded && loaded.banks && loaded.items) state=loaded;
  render();
})();
</script>
</body>
</html>
